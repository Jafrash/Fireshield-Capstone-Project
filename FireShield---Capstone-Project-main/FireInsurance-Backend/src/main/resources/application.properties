spring.application.name=FireInsurance
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# H2 Database Configuration - File-based with AUTO_SERVER to prevent lock conflicts
spring.datasource.url=jdbc:h2:file:./data/demo;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Keep Spring AI auto-config disabled for local dev (no API key required)
spring.autoconfigure.exclude=org.springframework.ai.model.openai.autoconfigure.OpenAiAudioSpeechAutoConfiguration,org.springframework.ai.model.openai.autoconfigure.OpenAiAutoConfiguration

# File upload configuration
file.upload.dir=uploads
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# JWT Configuration
jwt.secret=mySecretKey12345mySecretKey12345mySecretKey12345mySecretKey12345
jwt.expiration=86400000

