<header class="border-b border-gray-200 shadow-sm px-8 py-4 sticky top-0 z-40 backdrop-blur-sm bg-white/98">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-[20px] font-bold text-gray-900">FireShield Insurance Portal</h1>
      <p class="text-[12px] text-gray-500">Fire & Property Protection</p>
    </div>

    <div class="flex items-center gap-4">
      <!-- Notifications Button -->
      <button class="relative p-3 rounded-xl hover:bg-gray-100 transition-all duration-200" aria-label="Notifications">
        <span class="material-icons text-gray-600 text-[24px]">notifications</span>
        <!-- Notification Badge -->
        <span class="absolute top-2 right-2 w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
      </button>

      <!-- User Menu -->
      <div class="relative">
        <button (click)="toggleUserMenu()" 
                class="flex items-center gap-3 px-4 py-2.5 rounded-xl hover:bg-gray-50 transition-all duration-200 group border border-gray-200">
          <div class="w-10 h-10 rounded-xl flex items-center justify-center font-bold text-[16px] shadow-sm text-white"
               style="background: linear-gradient(135deg, #C72B32, #FF6B35);">
            {{ getUserInitials() }}
          </div>
          <div class="hidden md:block text-left">
            <div class="font-semibold text-[14px] text-gray-900">{{ username }}</div>
            <div class="text-[12px] text-gray-500 uppercase tracking-wide">{{ role }}</div>
          </div>
          <span class="material-icons text-gray-400 text-[20px] transition-transform duration-200" 
                [class.rotate-180]="showUserMenu">expand_more</span>
        </button>

        @if (showUserMenu) {
          <div class="absolute right-0 mt-3 w-72 bg-white rounded-2xl shadow-2xl border border-gray-200 overflow-hidden z-50" style="animation: slideDown 0.2s ease-out;">
            <div class="px-6 py-5 border-b border-gray-100 bg-gradient-to-r from-gray-50 to-white">
              <div class="flex items-center gap-3 mb-3">
                <div class="w-12 h-12 rounded-xl flex items-center justify-center font-bold text-[18px] shadow-md text-white"
                     style="background: linear-gradient(135deg, #C72B32, #FF6B35);">
                  {{ getUserInitials() }}
                </div>
                <div>
                  <div class="font-bold text-[15px] text-gray-900">{{ username }}</div>
                  <div class="text-[13px] text-gray-600">{{ email }}</div>
                </div>
              </div>
              <div class="inline-flex items-center gap-2 px-3 py-1.5 bg-white rounded-lg text-[12px] font-semibold text-fire-red border border-fire-red/20 shadow-sm">
                <span class="material-icons text-[16px]">badge</span>
                <span>{{ role }}</span>
              </div>
            </div>
            <button (click)="logout()" 
                    class="w-full flex items-center gap-3 px-6 py-4 text-[14px] font-semibold text-gray-700 hover:bg-red-50 hover:text-red-600 transition-all duration-200 group">
              <span class="material-icons text-gray-400 group-hover:text-red-600 transition-colors text-[20px]">logout</span>
              <span>Logout</span>
            </button>
          </div>
        }
      </div>
    </div>
  </div>
</header>
